<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestión</title>
        <link rel="stylesheet" href="css/gestion-css.css">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <script type="text/javascript"
            src="https://www.gstatic.com/charts/loader.js"></script>
    </head>
    <body>
        <header>
            <nav class="navbar navbar-dark bg-header fixed-top">
                <div class="container-fluid">
                    <a class="navbar-brand fw-bold p-2" href="#">Panel de
                        Gestión</a>
                </div>
            </nav>
        </header>

        <div class="container-fluid">
            <div class="row">

                <!-- PANELITO LATERAL -->
                <nav
                    class="col-md-2 d-none d-md-block sidebar pt-3 navbar-collapse">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <!-- La clase active sirve para que se note que este activado, esta clase
                            la usaremos más cuando se este incorporando funcionalidad al sitio-->
                            <a
                                class="nav-link active btn btn-outline-light m-lg-1"
                                href="#">
                                Panel Principal</a>
                        </li>
                        <!--Reportes-->
                        <li class="nav-item"><!--data-bs-toggle sirve para activar que pueda 
                            ser un menu desplegable-->
                            <a class="nav-link btn btn-outline-light m-lg-1"
                                data-bs-toggle="collapse"
                                href="#subReporte">
                                Reportes
                            </a>
                            <div class="collapse ps-3" id="subReporte">
                                <a href="#"
                                    class="nav-link btn btn-outline-light m-lg-1">Reporte
                                    1</a>
                                <a href="#"
                                    class="nav-link btn btn-outline-light m-lg-1">Reporte
                                    2</a>
                            </div>
                        </li>

                        <!--Productos-->
                        <li class="nav-item">
                            <a class="nav-link btn btn-outline-light m-lg-1"
                                data-bs-toggle="collapse"
                                href="#subProductos">
                                Productos
                            </a>
                            <div class="collapse ps-3" id="subProductos">
                                <a href="productos-agregar.html"
                                    class="nav-link btn btn-outline-light m-lg-1">Agregar</a>
                                <a href="#"
                                    class="nav-link btn btn-outline-light m-lg-1">Actualizar</a>
                                <a href="#"
                                    class="nav-link btn btn-outline-light m-lg-1">Eliminar</a>
                            </div>
                        </li>
                        <!--Usuarios-->
                        <li class="nav-item">
                            <a class="nav-link btn btn-outline-light m-lg-1"
                                href="#">Usuarios</a>
                        </li>
                    </ul>
                </nav>

                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                    <h1 class="mt-4 mb-4 text-center p-3">Panel Principal</h1>

                    <!-- PANELITOS DE RESUMEN -->
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="card text-white bg-primary mb-3">
                                <div class="card-body">
                                    <h5 class="card-title">Venta del mes</h5>
                                    <p class="card-text">10.000</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-white bg-success mb-3">
                                <div class="card-body">
                                    <h5 class="card-title">Ventas Mensuales</h5>
                                    <p class="card-text">75</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-white bg-warning mb-3">
                                <div class="card-body">
                                    <h5 class="card-title">Productos</h5>
                                    <p class="card-text">25</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- GRAFICOS -->
                    <div class="row overflow-hidden">
                        <!-- Grafico 1 -->
                        <div class="col-lg-6 mb-4">
                            <div class="chart-container">
                                <div id="chart1"></div>
                            </div>
                        </div>
                        <!-- Grafico 2 -->
                        <div class="col-lg-6 mb-4">
                            <div class="chart-container">
                                <div id="chart2"></div>
                            </div>
                        </div>
                        <!-- Grafico 3 -->
                        <div class="col-lg-6 mb-4">
                            <div class="chart-container">
                                <div id="chart3"></div>
                            </div>
                        </div>
                        <!-- Grafico 4 -->
                        <div class="col-lg-6 mb-4">
                            <div class="chart-container">
                                <div id="chart4"></div>
                            </div>
                        </div>
                        <!-- Grafico 5 -->
                        <div class="col-lg-12 mb-4">
                            <div class="chart-container">
                                <div id="chart5"></div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <footer class="bg-dark text-white text-center py-2">
            <div>© 2025 - Panel de Gestión | Derechos reservados :D</div>
        </footer>

        <script type="text/javascript" src="js/gestion-graficos.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
