<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Taberna de Roly</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="/css/contact-css.css">
  <link rel="stylesheet" href="/css/login-css.css">
</head>

<body>
  <div id="navbar-placeholder"></div>

  <!-- Hero -->
  <header class="bg-dark text-white text-center p-5">
    <h1 class="display-4">Bienvenido a La Taberna de Roly</h1>
    <p class="lead">Donde cada copa cuenta una historia</p>
    <a href="#productos" class="btn btn-danger">Explorar</a>
  </header>

  <!-- Productos -->
  <section id="productos" class="py-5">
    <div class="container">
      <h2 class="text-center mb-4">Nuestros Productos</h2>
      <div class="row">
        <div class="col-md-4 mb-3">
          <div class="card">
            <img src="img/vino.jpg" class="card-img-top" alt="Vino Tinto">
            <div class="card-body">
              <h5 class="card-title">Vino Tinto</h5>
              <p class="card-text">Un clásico para toda ocasión.</p>
            </div>
          </div>
        </div>
        <div class="col-md-4 mb-3">
          <div class="card">
            <img src="/img/vinoblanco.webp" class="card-img-top" alt="Vino Blanco">
            <div class="card-body">
              <h5 class="card-title">Vino Blanco</h5>
              <p class="card-text">Fresco y ligero.</p>
            </div>
          </div>
        </div>
        <div class="col-md-4 mb-3">
          <div class="card">
            <img src="/img/vinoEspumo.jpg" class="card-img-top" alt="Espumoso">
            <div class="card-body">
              <h5 class="card-title">Espumoso</h5>
              <p class="card-text">Perfecto para celebrar.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('navbar.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('navbar-placeholder').innerHTML = data;
      });
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
      });
  </script>
</body>

</html>
