<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Agregar Producto</title>
        <link rel="stylesheet" href="css/gestion-css.css">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
    </head>
    <body>
        <header>
            <nav class="navbar navbar-dark bg-header fixed-top">
                <div class="container-fluid">
                    <a class="navbar-brand fw-bold p-2" href="#">Panel de
                        Gestión</a>
                </div>
            </nav>
        </header>
        <div class="container-fluid">
            <div class="row">
                <nav
                    class="col-md-2 d-none d-md-block sidebar pt-3 navbar-collapse">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link btn btn-outline-light m-lg-1"
                                href="gestion.html">Panel Principal</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-outline-light m-lg-1"
                                data-bs-toggle="collapse"
                                href="#subReporte">Reportes</a>
                            <div class="collapse ps-3" id="subReporte">
                                <a href="#"
                                    class="nav-link btn btn-outline-light m-lg-1">Reporte
                                    1</a>
                                <a href="#"
                                    class="nav-link btn btn-outline-light m-lg-1">Reporte
                                    2</a>
                            </div>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-outline-light m-lg-1 active"
                                data-bs-toggle="collapse"
                                href="#subProductos">Productos</a>
                            <div class="collapse ps-3" id="subProductos">
                                <a href="productos-agregar.html"
                                    class="nav-link btn btn-outline-light m-lg-1 active">Agregar</a>
                                <a href="productos-actualizar.html"
                                    class="nav-link btn btn-outline-light m-lg-1">Actualizar</a>
                                <a href="productos-eliminar.html"
                                    class="nav-link btn btn-outline-light m-lg-1">Eliminar</a>
                            </div>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-outline-light m-lg-1"
                                href="#">Usuarios</a>
                        </li>
                    </ul>
                </nav>

                <!-- Panel para ingresdar el producto -->
                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 min-vh-100">
                    <h1 class="mt-4 mb-4 text-center p-3">Agregar Producto</h1>

                    <div class="card p-3">
                        <form>
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre
                                    del Producto</label>
                                <input type="text" class="form-control"
                                    id="nombre" required>
                            </div>
                            <div class="mb-3">
                                <label for="descripcion"
                                    class="form-label">Descripción</label>
                                <textarea class="form-control" id="descripcion"
                                    rows="3"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="precio"
                                    class="form-label">Precio</label>
                                <input type="number" class="form-control"
                                    id="precio" required>
                            </div>
                            <button type="submit"
                                class="btn btn-primary">Agregar
                                Producto</button>
                        </form>
                    </div>
                </main>
            </div>
        </div>

        
        <footer class="bg-dark text-white text-center py-2">
            <div>© 2025 - Panel de Gestión | Derechos reservados :D</div>
        </footer>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
